<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="vendor/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#1a1a2e;color:#e0e0e0;font-family:sans-serif}
#map{height:100%;width:100%}
#status{position:fixed;bottom:20px;left:20px;right:20px;background:#16213e;padding:12px 16px;border-radius:8px;font-size:13px;z-index:1000;border:1px solid #0f3460;text-align:center}
</style>
</head>
<body>
<div id="map"></div>
<div id="status">Starting GPS...</div>
<script src="vendor/leaflet.js"></script>
<script>
var params=new URLSearchParams(location.search);
var deviceId=params.get('device_id');
var token=params.get('token');
var API='';
var map=L.map('map',{zoomControl:false}).setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OSM'}).addTo(map);
var marker=null,watchId=null,count=0;

function postLocation(lat,lng,acc,spd,alt){
  fetch(API+'/api/locations',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({device_id:deviceId,latitude:lat,longitude:lng,accuracy:acc,speed:spd,altitude:alt})
  }).then(function(r){
    if(r.ok)count++;
  }).catch(function(){});
}

function updateMarker(lat,lng){
  if(marker){
    marker.setLatLng([lat,lng]);
  }else{
    marker=L.marker([lat,lng],{
      icon:L.divIcon({className:'',html:'<div style="width:20px;height:20px;border-radius:50%;background:#4fc3f7;border:3px solid #fff;box-shadow:0 0 10px rgba(0,0,0,.6)"></div>',iconSize:[20,20],iconAnchor:[10,10]})
    }).addTo(map).bindPopup('<b>My Device</b>');
  }
  map.setView([lat,lng],16);
}

document.getElementById('status').textContent='Requesting GPS...';

watchId=navigator.geolocation.watchPosition(function(pos){
  var lat=pos.coords.latitude,lng=pos.coords.longitude;
  var acc=pos.coords.accuracy,spd=pos.coords.speed,alt=pos.coords.altitude;
  updateMarker(lat,lng);
  postLocation(lat,lng,acc,spd,alt);
  document.getElementById('status').textContent='Tracking active ('+count+' reports) | '+
    lat.toFixed(5)+', '+lng.toFixed(5)+' ±'+Math.round(acc)+'m';
},function(err){
  document.getElementById('status').textContent='GPS error: '+err.message;
},{enableHighAccuracy:true,maximumAge:5000,timeout:30000});
</script>
</body>
</html>
